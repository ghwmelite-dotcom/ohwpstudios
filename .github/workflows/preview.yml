name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PUBLIC_GA_ID: ${{ vars.PUBLIC_GA_ID }}
          PUBLIC_CF_BEACON_TOKEN: ${{ vars.PUBLIC_CF_BEACON_TOKEN }}
          PUBLIC_SENTRY_DSN: ${{ vars.PUBLIC_SENTRY_DSN }}
          PUBLIC_COMMIT_SHA: ${{ github.sha }}

      # No D1 migrations on previews. NOTE: preview functions share the PRODUCTION
      # D1 database — schema-changing or destructive PR code will affect prod data.

      - name: Deploy preview
        id: deploy
        run: |
          set -o pipefail
          url=$(npx wrangler pages deploy dist --project-name=ohwpstudios --branch="pr-${{ github.event.pull_request.number }}" --commit-dirty=true | tee /dev/stderr | grep -Eo 'https://[^ ]+\.pages\.dev' | tail -1)
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            if (!url) { core.setFailed('No preview URL captured'); return; }
            const marker = '<!-- preview-url -->';
            const body = `${marker}\n🔍 **Preview deployed:** ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
